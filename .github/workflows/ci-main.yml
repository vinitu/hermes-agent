name: CI · Main Push · Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-main-hermes
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          curl -sL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint

      - name: Lint
        run: hadolint Dockerfile

  calculate_tag:
    name: Compute next tag
    needs:
      - lint
    if: |
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        github.actor != 'github-actions[bot]'
      ) || (
        github.event_name == 'workflow_dispatch'
      )
    uses: vinitu/github-workflows/.github/workflows/workflow-compute-next-tag.yml@v0.1.9
    with:
      target-branch: main
      version-bump: patch
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  create_tag:
    name: Create git tag
    needs:
      - lint
      - calculate_tag
    if: ${{ needs.calculate_tag.result == 'success' }}
    uses: vinitu/github-workflows/.github/workflows/workflow-create-tag.yml@v0.1.9
    with:
      target-branch: main
      next-tag: ${{ needs.calculate_tag.outputs['new-tag'] }}
      previous-tag: ${{ needs.calculate_tag.outputs['previous-tag'] }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: Build & Push Image
    needs:
      - create_tag
    if: ${{ needs.create_tag.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.create_tag.outputs['new-tag'] }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create_release:
    name: Publish release
    needs:
      - create_tag
      - build-and-push
    if: ${{ needs.build-and-push.result == 'success' && needs.create_tag.result == 'success' }}
    uses: vinitu/github-workflows/.github/workflows/workflow-create-release.yml@v0.1.9
    with:
      tag-name: ${{ needs.create_tag.outputs['new-tag'] }}
      previous-tag: ${{ needs.create_tag.outputs['previous-tag'] }}
      merged-prs: "[]"
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}